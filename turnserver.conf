# ============================================================================
#  SecureComm coturn config — for a VPS WITH A PUBLIC IP (not Railway).
#  Replace YOUR.PUBLIC.IP with the server's real public IPv4 address.
# ============================================================================

# Client-facing listeners
listening-port=3478
tls-listening-port=5349

# Bind to all interfaces; advertise the PUBLIC ip as the relay address.
listening-ip=0.0.0.0
# CRITICAL on any cloud VM (the box only sees a private IP internally):
# external-ip maps the public IP so relay candidates are actually reachable.
external-ip=YOUR.PUBLIC.IP

# Long-term credentials (matches what the app is configured with)
lt-cred-mech
user=userturn:passturn
realm=securecomm

fingerprint
stale-nonce

# Relay port range — THESE UDP PORTS MUST BE OPEN IN THE FIREWALL/SECURITY GROUP
min-port=49152
max-port=49252

# Safety
no-loopback-peers
no-multicast-peers
no-cli

# Logging to stdout (works in Docker/systemd)
simple-log
log-file=stdout
verbose
